<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemoci — OCR to Spreadsheet</title>
<script src="jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:480px;box-shadow:0 2px 16px #0001}
h1{font-size:1.4rem;font-weight:700;margin-bottom:8px;color:#1a1a1a}
.steps{color:#555;font-size:.85rem;margin-bottom:20px;padding-left:18px;line-height:1.8}
.steps a{color:#4285f4}
#key-label{font-size:.8rem;color:#888;margin-bottom:6px}
#key-label a{color:#4285f4}
.key-row{display:flex;gap:8px;align-items:center;margin-bottom:24px}
#api-key{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:.9rem;font-family:monospace;background:#fafafa}
#api-key.set{color:#aaa;background:#f5f5f5;cursor:default}
#clear-btn{background:none;border:1px solid #ddd;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:.8rem;white-space:nowrap;color:#666}
#clear-btn:hover{border-color:#c62828;color:#c62828}
#main-panel{display:flex;flex-direction:column;gap:16px}
#dropzone{border:2px dashed #ccc;border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;color:#888}
#dropzone.drag,#dropzone:hover{border-color:#4285f4;background:#f0f6ff;color:#4285f4}
#file-name{font-size:.85rem;color:#4285f4;font-weight:500;min-height:1.2em}
#process-btn{background:#34a853;color:#fff;border:none;padding:14px;border-radius:6px;font-size:1rem;cursor:pointer;font-weight:600}
#process-btn:hover:not(:disabled){background:#2d9248}
#process-btn:disabled{background:#ccc;cursor:not-allowed}
#spinner{text-align:center;padding:16px;color:#888;font-size:.9rem}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #ccc;border-top-color:#4285f4;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
#error-msg{background:#fce8e8;color:#c62828;padding:12px;border-radius:6px;font-size:.85rem}
#file-input{display:none}
</style>
</head>
<body>
<div class="card">
  <h1>Gemoci</h1>
  <ol class="steps">
    <li>Get a free API key at <a href="https://aistudio.google.com/api-keys" target="_blank">aistudio.google.com/api-keys</a></li>
    <li>Paste it below and press Enter</li>
    <li>Drop a document and click Extract</li>
  </ol>

  <div id="key-label">Gemini API key</div>
  <form class="key-row" onsubmit="return false">
    <input type="password" id="api-key" placeholder="Paste key, press Enter">
    <button id="clear-btn" hidden>Clear</button>
  </form>

  <div id="main-panel" hidden>
    <div id="dropzone">
      <div>Drop an image or PDF here, or click to browse</div>
      <div id="file-name"></div>
      <input type="file" id="file-input" accept="image/*,application/pdf">
    </div>
    <div id="spinner" hidden><span class="spin"></span>Processing with Gemini...</div>
    <button id="process-btn" disabled>Extract &amp; Download ODS</button>
  </div>

  <div id="error-msg" hidden></div>
</div>
<script type="module" src="src/app.js"></script>
</body>
</html>
