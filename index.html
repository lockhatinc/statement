<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemoci — OCR to Spreadsheet</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:480px;box-shadow:0 2px 16px #0001}
h1{font-size:1.4rem;font-weight:700;margin-bottom:8px;color:#1a1a1a}
.sub{color:#666;font-size:.9rem;margin-bottom:32px}
#key-panel{display:flex;flex-direction:column;gap:12px}
#key-panel label{font-size:.85rem;color:#555}
#key-panel a{color:#4285f4}
#api-key{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:.95rem;font-family:monospace}
#key-btn{background:#4285f4;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-size:1rem;cursor:pointer;width:100%}
#key-btn:hover{background:#3367d6}
#main-panel{display:flex;flex-direction:column;gap:16px}
.key-row{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:#555}
#clear-btn{background:none;border:1px solid #ddd;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:.8rem}
#dropzone{border:2px dashed #ccc;border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;color:#888}
#dropzone.drag,#dropzone:hover{border-color:#4285f4;background:#f0f6ff;color:#4285f4}
#file-name{font-size:.85rem;color:#4285f4;font-weight:500;min-height:1.2em}
#process-btn{background:#34a853;color:#fff;border:none;padding:14px;border-radius:6px;font-size:1rem;cursor:pointer;font-weight:600}
#process-btn:hover:not(:disabled){background:#2d9248}
#process-btn:disabled{background:#ccc;cursor:not-allowed}
#spinner{text-align:center;padding:16px;color:#888;font-size:.9rem}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #ccc;border-top-color:#4285f4;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
#error-msg{background:#fce8e8;color:#c62828;padding:12px;border-radius:6px;font-size:.85rem}
#file-input{display:none}
</style>
</head>
<body>
<div class="card">
  <h1>Gemoci</h1>
  <p class="sub">OCR any image to a spreadsheet using Gemini AI</p>

  <div id="key-panel">
    <label>Gemini API key — get one free at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></label>
    <input type="password" id="api-key" placeholder="AIza...">
    <button id="key-btn">Use this key</button>
    <div id="error-msg" hidden></div>
  </div>

  <div id="main-panel" hidden>
    <div class="key-row">
      <span>API key set</span>
      <button id="clear-btn">Change key</button>
    </div>
    <div id="dropzone">
      <div>Drop an image here or click to browse</div>
      <div id="file-name"></div>
      <input type="file" id="file-input" accept="image/*">
    </div>
    <div id="spinner" hidden><span class="spin"></span>Processing with Gemini&hellip;</div>
    <button id="process-btn" disabled>Extract &amp; Download ODS</button>
    <div id="error-msg" hidden></div>
  </div>
</div>
<script type="module" src="src/app.js"></script>
</body>
</html>
